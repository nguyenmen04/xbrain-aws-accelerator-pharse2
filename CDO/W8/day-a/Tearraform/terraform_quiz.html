    const Q = [
      { c: 1, q: "Terraform và cách tiếp cận Infrastructure as Code (IaC) giải quyết vấn đề cốt lõi nào?", opts: ["Tăng cường bảo mật cho ứng dụng web", "Tự động hóa, tái sử dụng và quản lý hạ tầng nhất quán bằng code thay vì click tay", "Quản lý source code ứng dụng như Git", "Viết code Front-end nhanh hơn"], ans: 1, exp: "IaC giúp biến hạ tầng thành code, dễ dàng tự động hóa, theo dõi phiên bản, và tránh lỗi do con người click tay." },
      { c: 2, q: "Lệnh `terraform init` dùng để làm gì?", opts: ["Tạo và áp dụng cấu hình lên cloud", "Kiểm tra lỗi cú pháp của code", "Khởi tạo dự án, tải về các provider và module cần thiết", "Xóa toàn bộ hạ tầng đã tạo"], ans: 2, exp: "`terraform init` là lệnh đầu tiên phải chạy. Nó sẽ đọc file cấu hình và tải về các plugin (provider) tương ứng như AWS, Google Cloud." },
      { c: 2, q: "Sự khác biệt chính giữa `terraform plan` và `terraform apply` là gì?", opts: ["Plan chỉ dùng cho AWS, Apply dùng cho Google Cloud", "Plan hiển thị bản xem trước những gì sẽ thay đổi, Apply thực thi những thay đổi đó", "Plan xóa resource, Apply tạo resource", "Không có sự khác biệt"], ans: 1, exp: "`terraform plan` giúp bạn xem trước (dry-run) danh sách những thứ sẽ được tạo, sửa, xóa. `terraform apply` là lúc ấn nút 'chốt' để thi công thật." },
      { c: 1, q: "Trong Terraform, block `provider` có vai trò gì?", opts: ["Chỉ định nhà cung cấp dịch vụ đám mây (như AWS, Azure) và cách xác thực", "Tạo ra một máy ảo EC2", "Định nghĩa vòng đời của tài nguyên", "Khai báo tài khoản ngân hàng để thanh toán"], ans: 0, exp: "Block `provider` giúp Terraform biết nó cần nói chuyện với nền tảng nào (ví dụ AWS) và dùng API key hay Region nào để làm việc." },
      { c: 3, q: "Trong HCL (ngôn ngữ của Terraform), để gọi đến giá trị của biến `instance_type`, ta dùng cú pháp nào?", opts: ["${instance_type}", "instance_type()", "var.instance_type", "@instance_type"], ans: 2, exp: "Để sử dụng một biến đã khai báo trong block variable, cú pháp chuẩn là `var.ten_bien`." },
      { c: 4, q: "Terraform State (file `terraform.tfstate`) có vai trò quan trọng nhất là gì?", opts: ["Lưu trữ mã nguồn ứng dụng HTML/CSS", "Kết nối tới cơ sở dữ liệu MySQL", "Ánh xạ (mapping) giữa code cấu hình và tài nguyên thực tế trên Cloud", "Bảo vệ tài khoản AWS khỏi hacker"], ans: 2, exp: "State là 'bộ nhớ' của Terraform. Nó dùng để nhớ xem những tài nguyên nào đã được nó tạo ra trên cloud để lần sau biết mà sửa hoặc xóa." },
      { c: 4, q: "Hiện tượng Drift (Trôi dạt) trong Terraform xảy ra khi nào?", opts: ["Khi máy tính bị mất mạng lúc đang chạy apply", "Khi ai đó lên thẳng giao diện web (Console) của AWS để sửa thông số bằng tay, khiến nó lệch với code", "Khi quên chạy lệnh terraform init", "Khi file state bị xóa nhầm"], ans: 1, exp: "Drift xảy ra khi hạ tầng thực tế (được sửa thủ công) khác biệt với những gì Terraform lưu trong file State và Code." },
      { c: 3, q: "Block `lifecycle` với tham số `prevent_destroy = true` có tác dụng gì?", opts: ["Tự động xóa tài nguyên khi không dùng", "Ngăn chặn Terraform xóa tài nguyên đó (rất hữu ích bảo vệ Database)", "Khởi động lại máy ảo nếu nó bị treo", "Bỏ qua lỗi cú pháp khi chạy code"], ans: 1, exp: "`prevent_destroy = true` là một tấm khiên bảo vệ. Nếu có lệnh nào đòi xóa nó (kể cả terraform destroy), Terraform sẽ báo lỗi và từ chối thực thi." },
      { c: 4, q: "Tại sao dùng Remote State trên S3 lại an toàn hơn Local State?", opts: ["Vì AWS S3 nhanh hơn ổ cứng máy tính", "Vì nó giúp chia sẻ trạng thái cho team, mã hóa thông tin nhạy cảm và hỗ trợ cơ chế khoá (Locking)", "Vì Terraform bắt buộc phải có Internet mới chạy được", "Vì S3 hoàn toàn miễn phí"], ans: 1, exp: "Remote State giải quyết 3 điểm yếu của Local State: Không chia sẻ được, Không bảo mật (plaintext) và Xung đột khi 2 người cùng apply." },
      { c: 4, q: "Với `backend \"s3\"`, thông số `use_lockfile = true` có tác dụng gì?", opts: ["Yêu cầu nhập mật khẩu mỗi lần apply", "Khóa state file trực tiếp trên S3 thông qua một file `.tflock`, tránh tình trạng 2 người cùng apply đè lên nhau", "Khóa tài khoản AWS", "Tự động backup code lên S3"], ans: 1, exp: "`use_lockfile = true` bật tính năng khóa native của S3, thay thế hoàn toàn bảng DynamoDB phức tạp ngày xưa." },
      { c: 3, q: "HCL có hỗ trợ người dùng tự viết hàm tuỳ chỉnh (custom function) không?", opts: ["Có, viết bằng ngôn ngữ Go", "Không, chỉ được phép sử dụng các hàm dựng sẵn (built-in functions) của Terraform", "Có, hỗ trợ viết bằng Python script", "Có, nhưng phải trả phí"], ans: 1, exp: "Bạn không thể tự định nghĩa hàm mới (trừ một số tính năng thử nghiệm ở bản cực mới). Bạn chỉ có thể gọi các hàm dựng sẵn như `length()`, `upper()`, v.v." },
      { c: 3, q: "Khác biệt cốt lõi giữa cấu trúc dữ liệu `list` và `tuple` trong HCL là gì?", opts: ["List dùng ngoặc vuông [], Tuple dùng ngoặc nhọn {}", "List đòi hỏi mọi phần tử phải cùng một kiểu dữ liệu, Tuple cho phép trộn nhiều kiểu (chuỗi, số, bool)", "List không có thứ tự, Tuple có thứ tự", "Không có gì khác biệt"], ans: 1, exp: "List là danh sách đồng nhất (VD: danh sách IP string). Tuple linh hoạt hơn, cho phép phần tử 1 là string, phần tử 2 là number." },
      { c: 3, q: "Khi bạn gán giá trị `null` cho một Argument trong block của Terraform, điều gì sẽ xảy ra?", opts: ["Sẽ báo lỗi NullPointerException", "Terraform sẽ tạo tài nguyên nhưng tắt nó đi", "Terraform sẽ coi như bạn CHƯA TỪNG KHAI BÁO argument đó và sẽ dùng giá trị mặc định", "Giá trị đó sẽ được gán là chuỗi chữ \"null\""], ans: 2, exp: "Giá trị `null` biểu thị sự vắng mặt. Nó cực kỳ hữu dụng khi bạn muốn tạo module và cho phép người dùng chọn 'bỏ qua' một cấu hình nào đó." },
      { c: 4, q: "Lệnh CLI nào giúp hiển thị chi tiết toàn bộ thuộc tính của một tài nguyên ĐANG ĐƯỢC Terraform quản lý?", opts: ["terraform show resource", "terraform state show <resource_id>", "terraform inspect", "aws ec2 describe-instances"], ans: 1, exp: "Lệnh `terraform state show` sẽ trích xuất và hiển thị dữ liệu từ trong cache (file State) một cách gọn gàng." },

    function shuffle(a) { return [...a].sort(() => Math.random() - .5) }
    function switchTab(tab) {
      activeTab = tab;
      document.getElementById('tab-theory').classList.toggle('active', tab === 'theory');
      document.getElementById('tab-practice').classList.toggle('active', tab === 'practice');
      document.getElementById('tag-row').style.display = tab === 'theory' ? 'flex' : 'none';
      tab === 'theory' ? startTheory() : startPractice();
    }
    function startTheory() { cur = 0; score = 0; answered = false; cat = { 1: { c: 0, t: 0 }, 2: { c: 0, t: 0 }, 3: { c: 0, t: 0 }, 4: { c: 0, t: 0 } }; shuffled = shuffle(Q); renderQ() }
    function startPractice() { cur = 0; score = 0; answered = false; cat = { 1: { c: 0, t: 0 }, 2: { c: 0, t: 0 }, 3: { c: 0, t: 0 }, 4: { c: 0, t: 0 } }; shuffled = shuffle(QP); renderQ() }
    function renderQ() {
      const app = document.getElementById('app');
      const q = shuffled[cur];
      const isPrac = activeTab === 'practice';
      const pct = Math.round(cur / shuffled.length * 100);
      const badge = isPrac ? `<div class="scenario-badge">🛠️ Scenario · Thực Tế</div>` : `<div class="badge-th ${catCls[q.c]}">${catL[q.c]}</div>`;
      const sc = isPrac && q.sc ? `<div class="scenario-box">📋 <strong>Tình huống:</strong> ${q.sc}</div>` : '';
      app.innerHTML = `
  <div class="top-bar"><span>Câu ${cur + 1}/${shuffled.length}</span><span class="score-live">✅ ${score} đúng</span></div>
  <div class="progress-bar"><div class="progress-fill ${isPrac ? 'pf-practice' : 'pf-theory'}" style="width:${pct}%"></div></div>
  <div class="card">${badge}${sc}
    <div class="q-text">${q.q}</div>
    <div class="options" id="opts">${q.opts.map((o, i) => `<button class="opt" id="o${i}" onclick="pick(${i})">${String.fromCharCode(65 + i)}. ${o}</button>`).join('')}</div>
    <div class="feedback" id="fb"></div>
    <button class="btn-next ${isPrac ? 'practice' : 'theory'}" id="nxt" onclick="next()">${cur === shuffled.length - 1 ? '🏁 Xem Kết Quả' : 'Câu tiếp →'}</button>
  </div>`;
    }
    function pick(i) {
      if (answered) return; answered = true;
      const q = shuffled[cur];
      const opts = document.querySelectorAll('.opt');
      opts.forEach(o => o.classList.add('disabled'));
      const isPrac = activeTab === 'practice';
      if (!isPrac && q.c) cat[q.c].t++;
      const fb = document.getElementById('fb');
      if (i === q.ans) { score++; if (!isPrac && q.c) cat[q.c].c++; opts[i].classList.add('correct'); fb.className = 'feedback correct show'; fb.innerHTML = `<strong>✅ Chính xác!</strong><br><br>${q.exp}`; }
      else { opts[i].classList.add('wrong'); opts[q.ans].classList.add('correct'); fb.className = 'feedback wrong show'; fb.innerHTML = `<strong>❌ Chưa đúng.</strong> Đáp án: <strong>${String.fromCharCode(65 + q.ans)}. ${q.opts[q.ans]}</strong><br><br>${q.exp}`; }
      document.getElementById('nxt').style.display = 'block';
    }

    function next() { answered = false; cur++; if (cur >= shuffled.length) { showResult(); return; } renderQ() }
    function showResult() {
      const ip = activeTab === 'practice';
      const pct = Math.round(score / shuffled.length * 100);
      let bdg = '', msg = '';
      if (pct >= 90) { bdg = '<span class="bdg bdg-gold">🏆 Terraform Master</span>'; msg = ip ? 'Khả năng giải quyết tình huống thực tế bằng Terraform quá tuyệt! 🚀' : 'Bạn đã nắm cực vững lý thuyết Terraform từ Cơ bản đến Nâng cao!'; }
      else if (pct >= 70) { bdg = '<span class="bdg bdg-silver">🥈 Engineer</span>'; msg = 'Gần vươn tới mức Master rồi! Xem lại vài kiến thức còn hổng nhé.'; }
      else { bdg = '<span class="bdg bdg-bronze">💪 Cần Luyện Thêm</span>'; msg = 'Đọc lại các bài giảng về State và CLI để củng cố nhé!'; }
      const bkHTML = ip ? '' : `<div class="breakdown">${[1, 2, 3, 4].map(k => { const s = cat[k]; const p = s.t > 0 ? Math.round(s.c / s.t * 100) : '-'; return `<div class="bk-item"><span class="bk-num ${catC[k]}">${p}${s.t > 0 ? '%' : ''}</span>${catL[k]}<br><small>${s.c}/${s.t}</small></div>` }).join('')}</div>`;
      document.getElementById('app').innerHTML = `
  <div class="card score-card">
    <div class="score-big ${ip ? 'sb-p' : 'sb-t'}">${pct}%</div>
    <div class="score-sub">${score} / ${shuffled.length} câu đúng</div>
    ${bdg}<div class="score-msg">${msg}</div>
    ${bkHTML}
    <button class="btn-retry ${ip ? 'practice' : 'theory'}" onclick="${ip ? 'startPractice()' : 'startTheory()'}">🔄 Làm Lại</button>
    <button class="btn-switch" onclick="switchTab('${ip ? 'theory' : 'practice'}')">
      ${ip ? '📚 Chuyển sang Lý Thuyết' : '🛠️ Thử Bài Thực Tế'}
    </button>
  </div>`;
    }
    
    // Set dynamic lengths on buttons before start
    document.getElementById('tab-theory').innerHTML = `📚 Lý Thuyết (${Q.length} câu)`;
    document.getElementById('tab-practice').innerHTML = `🛠️ Thực Tế (${QP.length} câu)`;
    startTheory();
  </script>
</body>

</html>
